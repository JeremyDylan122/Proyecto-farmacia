server:
  port: 8088

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: MSBoleta
              uri: lb://MSBOLETA
              predicates:
                - Path=/api/boletas/**, /api/recetas-clientes/**
            - id: MSclienteBeneficio
              uri: lb://MSCLIENTEBENEFICIO
              predicates:
                - Path=/api/beneficios/**, /api/clientes/**
            - id: ms-catalogo
              uri: lb://MS-CATALGO
              predicates:
                - Path=/api/v1/productos/**
            - id: ms-inventario
              uri: lb://MS-INVENTARIO      
              predicates:
                - Path=/api/v1/inventario/**, /api/v1/lotes/**, /api/v1/movimientos/**, /api/v1/stock/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka