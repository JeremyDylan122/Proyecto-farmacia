spring:
  application:
    name: ${SPRING_APPLICATION_NAME:ms-proveedor}
  
  output:
    ansi:
      enabled: ALWAYS

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never

  jpa:
    defer-datasource-initialization: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: esquema_proveedor

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: esquema_proveedor
    schemas: esquema_proveedor

server:
  port: 8085

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}

logging:
  level:
    org.springframework.web: INFO
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: INFO
    root: INFO

microservicio:
  farma:
    url: ${MICROSERVICIO_FARMA_URL:http://localhost:8086}